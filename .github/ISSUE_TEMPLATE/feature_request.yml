name: Feature Request
description: Sugerir uma nova funcionalidade
title: '[feat]: '
labels: ['feat']
body:
  - type: textarea
    id: problem
    attributes:
      label: Qual problema tributário resolve?
      description: Descreva o cenário fiscal que a feature atende.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solução proposta
      description: Como você imagina a API? Inclua exemplos de código.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: legal-basis
    attributes:
      label: Base legal
      description: 'Convênio ICMS, Lei Complementar, Portaria SEFAZ, etc.'
      placeholder: 'Ex: Convênio ICMS 142/2018, LC 214/2025'
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Qualquer informação extra relevante.
    validations:
      required: false
